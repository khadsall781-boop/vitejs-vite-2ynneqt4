<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storm Chaser GPS Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #555;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .status {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }

    .status.inactive {
      background: #fef3c7;
      color: #92400e;
    }

    .status.active {
      background: #d1fae5;
      color: #065f46;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
    }

    .info-item {
      text-align: center;
    }

    .info-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }

    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌪️ Storm Chaser GPS</h1>
    <p class="subtitle">Live Location Tracking</p>

    <div class="form-group">
      <label for="callsign">Your Callsign</label>
      <input
        type="text"
        id="callsign"
        placeholder="e.g., CHASE1"
        autocomplete="off"
      />
    </div>

    <div class="form-group">
      <label for="interval">Update Interval (seconds)</label>
      <input
        type="number"
        id="interval"
        value="10"
        min="5"
        max="60"
      />
    </div>

    <div id="status" class="status inactive">
      Not Tracking
    </div>

    <button id="startBtn" class="btn btn-primary">
      Start Tracking
    </button>

    <button id="stopBtn" class="btn btn-danger" style="display: none;">
      Stop Tracking
    </button>

    <div class="info-grid" id="infoGrid" style="display: none;">
      <div class="info-item">
        <div class="info-label">Latitude</div>
        <div class="info-value" id="lat">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">Longitude</div>
        <div class="info-value" id="lon">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">Speed</div>
        <div class="info-value" id="speed">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">Updates Sent</div>
        <div class="info-value" id="count">0</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://uklywcbgqxbhlixuxxms.supabase.co/functions/v1/share-location';

    let tracking = false;
    let intervalId = null;
    let watchId = null;
    let updateCount = 0;
    let lastPosition = null;

    const callsignInput = document.getElementById('callsign');
    const intervalInput = document.getElementById('interval');
    const statusDiv = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const infoGrid = document.getElementById('infoGrid');

    // Load saved callsign
    const savedCallsign = localStorage.getItem('chaserCallsign');
    if (savedCallsign) {
      callsignInput.value = savedCallsign;
    }

    function updateStatus(message, type = 'inactive') {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }

    function updateInfo(position, speed) {
      document.getElementById('lat').textContent = position.coords.latitude.toFixed(6);
      document.getElementById('lon').textContent = position.coords.longitude.toFixed(6);
      document.getElementById('speed').textContent = speed ? `${speed.toFixed(1)} mph` : '-';
      document.getElementById('count').textContent = updateCount;
    }

    function calculateSpeed(pos1, pos2) {
      if (!pos1 || !pos2) return null;

      const timeDiff = (pos2.timestamp - pos1.timestamp) / 1000; // seconds
      if (timeDiff === 0) return null;

      const lat1 = pos1.coords.latitude * Math.PI / 180;
      const lat2 = pos2.coords.latitude * Math.PI / 180;
      const lon1 = pos1.coords.longitude * Math.PI / 180;
      const lon2 = pos2.coords.longitude * Math.PI / 180;

      const dLat = lat2 - lat1;
      const dLon = lon2 - lon1;

      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1) * Math.cos(lat2) *
                Math.sin(dLon/2) * Math.sin(dLon/2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      const distance = 6371000 * c; // meters

      const speedMps = distance / timeDiff;
      const speedMph = speedMps * 2.23694; // convert to mph

      return speedMph;
    }

    async function sendLocation(position) {
      const callsign = callsignInput.value.trim();

      if (!callsign) {
        updateStatus('Please enter your callsign', 'error');
        stopTracking();
        return;
      }

      const speed = calculateSpeed(lastPosition, position);
      lastPosition = position;

      const locationData = {
        callsign: callsign,
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        heading: position.coords.heading,
        speed: speed,
        altitude: position.coords.altitude,
        accuracy: position.coords.accuracy
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(locationData)
        });

        const result = await response.json();

        if (response.ok) {
          updateCount++;
          updateStatus(`Tracking Active (${updateCount} updates sent)`, 'active');
          updateInfo(position, speed);
        } else {
          updateStatus(`Error: ${result.error}`, 'error');
        }
      } catch (error) {
        updateStatus(`Network Error: ${error.message}`, 'error');
      }
    }

    function startTracking() {
      const callsign = callsignInput.value.trim();

      if (!callsign) {
        alert('Please enter your callsign');
        return;
      }

      // Save callsign
      localStorage.setItem('chaserCallsign', callsign);

      // Check if geolocation is supported
      if (!navigator.geolocation) {
        updateStatus('Geolocation not supported', 'error');
        return;
      }

      tracking = true;
      updateCount = 0;
      lastPosition = null;

      startBtn.style.display = 'none';
      stopBtn.style.display = 'block';
      infoGrid.style.display = 'grid';
      callsignInput.disabled = true;
      intervalInput.disabled = true;

      updateStatus('Acquiring GPS...', 'active');

      // Watch position continuously
      watchId = navigator.geolocation.watchPosition(
        (position) => {
          if (!tracking) return;
          sendLocation(position);
        },
        (error) => {
          updateStatus(`GPS Error: ${error.message}`, 'error');
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );

      // Set up interval for regular updates
      const interval = parseInt(intervalInput.value) * 1000;
      intervalId = setInterval(() => {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            if (tracking) sendLocation(position);
          },
          (error) => {
            console.error('Position error:', error);
          },
          {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
          }
        );
      }, interval);
    }

    function stopTracking() {
      tracking = false;

      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }

      startBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      callsignInput.disabled = false;
      intervalInput.disabled = false;

      updateStatus('Tracking Stopped', 'inactive');
    }

    startBtn.addEventListener('click', startTracking);
    stopBtn.addEventListener('click', stopTracking);

    // Keep screen awake if possible
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (err) {
        console.log('Wake lock error:', err);
      }
    }

    startBtn.addEventListener('click', requestWakeLock);
  </script>
</body>
</html>
